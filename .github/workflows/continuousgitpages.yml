name: Validar HTML- ci 

on:
  pull_request:
    branches:
      - main

jobs:
  html-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Validar arquivos HTML
        run: htmlhint "**/*.html"